<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { padding: 20px; background:#f4f6f9; }
    .card { box-shadow:0 4px 10px rgba(0,0,0,0.1); border-radius:10px; }
    .loader { border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite; display:inline-block; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>

<body>

<div class="container-fluid">

  <h3>📦 Reporte de Guías</h3>

  <div class="row">
    <div class="col-md-3">
      <label>Fecha inicio</label>
      <input type="date" id="start_date" class="form-control">
    </div>

    <div class="col-md-3">
      <label>Fecha fin</label>
      <input type="date" id="end_date" class="form-control">
    </div>

    <div class="col-md-3">
      <button class="btn btn-primary mt-4" onclick="buscar()">
        Buscar
        <span id="loader" style="display:none;" class="loader"></span>
      </button>
    </div>
  </div>

  <hr>

  <table id="tabla" class="table table-striped">
    <thead>
      <tr>
        <th>Guía</th>
        <th>Estado</th>
        <th>Fecha</th>
        <th>Empresa</th>
        <th>Cliente</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

let tabla;

$(document).ready(function () {
  tabla = $('#tabla').DataTable();

  let hoy = new Date().toISOString().split("T")[0];
  document.getElementById("start_date").value = hoy;
  document.getElementById("end_date").value = hoy;
});

async function fetchPage(start, end, page) {
  const res = await fetch(`/api/guias?start_date=${start}&end_date=${end}&page=${page}`);
  return await res.json();
}

async function buscar() {

  const start = document.getElementById("start_date").value;
  const end = document.getElementById("end_date").value;

  document.getElementById("loader").style.display = "inline-block";

  tabla.clear().draw();

  let page = 1;
  let totalPages = 1;

  try {

    while (page <= totalPages) {

      const response = await fetchPage(start, end, page);

      console.log("RESPUESTA API:", response);

      const data = response?.response || response;

      const rows = data?.rows || [];

      totalPages = data?.pager?.pages || 1;

      rows.forEach(r => {
        tabla.row.add([
          r.guide_number || "",
          r.status || "",
          r.createdAt || "",
          r.seller?.company_name || "",
          r.client?.name || "",
          r.total || 0
        ]);
      });

      tabla.draw(false);

      page++;

      await new Promise(r => setTimeout(r, 1200));
    }

    Swal.fire("OK", "Datos cargados correctamente", "success");

  } catch (e) {
    console.log(e);
    Swal.fire("Error", "No se pudo cargar información", "error");
  }

  document.getElementById("loader").style.display = "none";
}

</script>

</body>
</html>
