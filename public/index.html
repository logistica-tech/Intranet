<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reporte Maestro de Guías</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { padding: 20px; background:#f4f6f9; }
    .card { box-shadow:0 4px 10px rgba(0,0,0,0.1); border-radius:10px; }
    .btn-naranja { background-color: #ff7e00; border-color: #e06e00; color: #ffffff; font-weight: 600; transition: all 0.2s; }
    .btn-naranja:hover { background-color: #e06e00; border-color: #c56000; color: #ffffff; }
    .btn-naranja:disabled { background-color: #ffc299; border-color: #ffc299; cursor: not-allowed; }
    .loader { border: 4px solid #ffcca8; border-top: 4px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-left: 10px; vertical-align: middle;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .progress { height: 25px; border-radius: 10px; background-color: #ffe0c2; }
    .bg-naranja { background-color: #ff7e00 !important; }
    .alert-warning { font-size: 0.9rem; }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="card-body">
      <h3 class="card-title mb-4">Reporte de Guías</h3>

      <div class="row">
        <div class="col-md-3">
          <label>Fecha inicio</label>
          <input type="date" id="start_date" class="form-control">
        </div>
        <div class="col-md-3">
          <label>Fecha fin</label>
          <input type="date" id="end_date" class="form-control">
        </div>
        <div class="col-md-3">
          <label>&nbsp;</label>
          <button id="btnBuscar" class="btn btn-naranja btn-block" onclick="buscar()">
            <span id="btnText">Buscar</span>
            <span id="btnLoader" class="loader" style="display:none;"></span>
          </button>
        </div>
      </div>

      <!-- Mensaje de reintento -->
      <div class="alert alert-warning mt-3" id="alertaReintento" style="display:none;"></div>

      <!-- BARRA DE PROGRESO -->
      <div class="mt-3" id="contenedorProgreso" style="display: none;">
        <div class="d-flex justify-content-between mb-1">
          <span id="textoProgreso" class="font-weight-bold text-secondary" style="font-size: 0.9rem;">Descargando...</span>
          <span id="porcentajeProgreso" class="font-weight-bold text-dark">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar progress-bar-striped progress-bar-animated bg-naranja" id="barraProgreso" role="progressbar" style="width: 0%"></div>
        </div>
      </div>

      <hr>

      <table id="tabla" class="table table-striped table-bordered" style="width:100%">
        <thead>
          <tr>
            <th>Guía</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Empresa</th>
            <th>Remitente</th>
            <th>Destinatario</th>
            <th>Ciudad Dest.</th>
            <th>Transportadora</th>
            <th>Tipo Pago</th>
            <th>Total</th>
            <th>Recaudo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>

let tabla;
let detenerBusqueda = false;

 $(document).ready(function () {
  tabla = $('#tabla').DataTable({
    language: { url: "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" },
    dom: 'Bfrtip',
    buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
    pageLength: 50,
    order: [[ 2, "desc" ]],
    columnDefs: [{
      targets: 2,
      render: function (data, type, row) {
        if (type === 'sort' || type === 'filter' || !data) return data;
        try {
          const date = new Date(data);
          return date.toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' }) + ' ' + date.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return data; }
      }
    }]
  });

  let hoy = new Date().toISOString().split("T")[0];
  document.getElementById("start_date").value = hoy;
  document.getElementById("end_date").value = hoy;
});

function pausa(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function buscar() {
  const start = document.getElementById("start_date").value;
  const end = document.getElementById("end_date").value;

  if (!start || !end) return Swal.fire("Advertencia", "Selecciona fechas", "warning");

  // Mostrar UI
  document.getElementById("btnText").innerText = "Consultando...";
  document.getElementById("btnLoader").style.display = "inline-block";
  document.getElementById("btnBuscar").disabled = true;
  document.getElementById("contenedorProgreso").style.display = "block";
  document.getElementById("alertaReintento").style.display = "none";
  
  tabla.clear().draw(false);
  detenerBusqueda = false;

  let page = 1;
  let totalPages = 1;
  let totalGuias = 0;
  let reintentos = 0;
  const MAX_REINTENTOS = 3; // Si falla 3 veces seguidas en una página, paramos

  try {
    while (page <= totalPages && !detenerBusqueda) {
      
      const res = await fetch(`/api/guias?start_date=${start}&end_date=${end}&page=${page}`);
      const data = await res.json();

      if (!data.ok) {
        // SI FALLA (POR EJEMPLO, TIMEOUT DE HEKA O 502)
        reintentos++;
        
        if (reintentos >= MAX_REINTENTOS) {
          throw new Error(`La página ${page} falló demasiadas veces. Se detuvo la carga para no bloquear.`);
        }

        // Mostrar alerta amarilla y esperar 3 segundos antes de volver a intentar
        document.getElementById("alertaReintento").style.display = "block";
        document.getElementById("alertaReintento").innerHTML = `<strong>⚠️ Pausa:</strong> Heka tardó mucho en la página ${page}. Reintentando automáticamente (${reintentos}/${MAX_REINTENTOS})...`;
        
        await pausa(3000); // Esperar 3 segundos
        document.getElementById("alertaReintento").style.display = "none";
        
        continue; // Vuelve al inicio del while SIN sumarle a 'page' para reintentar la misma
      }

      // Si fue exitoso, reiniciamos el contador de reintentos
      reintentos = 0;
      totalPages = data.totalPages;
      
      if (data.rows.length > 0) {
        tabla.rows.add(data.rows);
        totalGuias += data.rows.length;
      }
      tabla.draw(false);

      // Actualizar barra
      const porcentaje = Math.round((page / totalPages) * 100);
      document.getElementById("barraProgreso").style.width = porcentaje + "%";
      document.getElementById("porcentajeProgreso").innerText = porcentaje + "%";
      document.getElementById("textoProgreso").innerText = `Página ${page} de ${totalPages} (${totalGuias} guías)`;

      page++;
      await pausa(150); // 150ms entre páginas para no saturar Render
    }

    if (!detenerBusqueda) {
      Swal.fire("¡Listo!", `${totalGuias} guías cargadas exitosamente.`, "success");
    }

  } catch (e) {
    console.error(e);
    Swal.fire("Error en la descarga", e.message, "error");
  } finally {
    document.getElementById("btnText").innerText = "Buscar";
    document.getElementById("btnLoader").style.display = "none";
    document.getElementById("btnBuscar").disabled = false;
    document.getElementById("alertaReintento").style.display = "none";
    
    setTimeout(() => {
      document.getElementById("contenedorProgreso").style.display = "none";
      document.getElementById("barraProgreso").style.width = "0%";
    }, 2000);
  }
}

</script>

</body>
</html>
