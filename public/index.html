<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reporte Maestro de Guías</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap4.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { padding: 20px; background:#f4f6f9; }
    .card { box-shadow:0 4px 10px rgba(0,0,0,0.1); border-radius:10px; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-left: 10px; vertical-align: middle;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* 🔥 ESTILO DEL BOTÓN NARANJA */
    .btn-naranja {
      background-color: #ff7e00; /* Color naranja vibrante */
      border-color: #e06e00;
      color: #ffffff;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-naranja:hover {
      background-color: #e06e00; /* Un poco más oscuro al pasar el mouse */
      border-color: #c56000;
      color: #ffffff;
    }
    .btn-naranja:disabled {
      background-color: #ffc299;
      border-color: #ffc299;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="card-body">
      <h3 class="card-title mb-4">Reporte de Guías</h3>

      <div class="row">
        <div class="col-md-3">
          <label>Fecha inicio</label>
          <input type="date" id="start_date" class="form-control">
        </div>
        <div class="col-md-3">
          <label>Fecha fin</label>
          <input type="date" id="end_date" class="form-control">
        </div>
        <div class="col-md-3">
          <label>&nbsp;</label>
          <!-- Aquí se cambió btn-primary por btn-naranja -->
          <button id="btnBuscar" class="btn btn-naranja btn-block" onclick="buscar()">
            <span id="btnText">Buscar</span>
            <span id="btnLoader" class="loader" style="display:none;"></span>
          </button>
        </div>
      </div>

      <hr>

      <table id="tabla" class="table table-striped table-bordered" style="width:100%">
        <thead>
          <tr>
            <th>Guía</th>
            <th>Estado</th>
            <th>Fecha</th>
            <th>Empresa</th>
            <th>Remitente</th>
            <th>Destinatario</th>
            <th>Ciudad Dest.</th>
            <th>Transportadora</th>
            <th>Tipo Pago</th>
            <th>Total</th>
            <th>Recaudo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<script>

let tabla;

 $(document).ready(function () {
  tabla = $('#tabla').DataTable({
    language: { url: "//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json" },
    dom: 'Bfrtip',
    buttons: ['copy', 'csv', 'excel', 'pdf', 'print'],
    pageLength: 50,
    order: [[ 2, "desc" ]],
    columnDefs: [{
      targets: 2,
      render: function (data, type, row) {
        if (type === 'sort' || type === 'filter' || !data) return data;
        try {
          const date = new Date(data);
          return date.toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric' }) + ' ' + date.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return data; }
      }
    }]
  });

  let hoy = new Date().toISOString().split("T")[0];
  document.getElementById("start_date").value = hoy;
  document.getElementById("end_date").value = hoy;
});

async function buscar() {
  const start = document.getElementById("start_date").value;
  const end = document.getElementById("end_date").value;

  if (!start || !end) return Swal.fire("Advertencia", "Selecciona fechas", "warning");

  // UI Loading
  document.getElementById("btnText").innerText = "Consultando...";
  document.getElementById("btnLoader").style.display = "inline-block";
  document.getElementById("btnBuscar").disabled = true;
  tabla.clear().draw();

  try {
    const res = await fetch(`/api/guias?start_date=${start}&end_date=${end}`);
    const data = await res.json();

    if (data.ok) {
      tabla.rows.add(data.rows).draw();
      Swal.fire("¡Listo!", `${data.rows.length} guías cargadas.`, "success");
    } else {
      throw new Error(data.error || "Error desconocido");
    }

  } catch (e) {
    console.error(e);
    Swal.fire("Error", "No se pudo conectar con el servidor", "error");
  } finally {
    // Restaurar Botón
    document.getElementById("btnText").innerText = "Buscar";
    document.getElementById("btnLoader").style.display = "none";
    document.getElementById("btnBuscar").disabled = false;
  }
}

</script>

</body>
</html>
