<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Descarga Masiva de Guías</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body { padding: 40px; background:#f4f6f9; }
    .card { box-shadow:0 4px 10px rgba(0,0,0,0.1); border-radius:10px; padding: 30px; }
    .btn-naranja { background-color: #ff7e00; border-color: #e06e00; color: #ffffff; font-weight: 600; font-size: 1.2rem; padding: 10px; }
    .btn-naranja:hover { background-color: #e06e00; border-color: #c56000; color: #ffffff; }
    .btn-naranja:disabled { background-color: #ffc299; border-color: #ffc299; cursor: not-allowed; }
  </style>
</head>

<body>

<div class="container">
  <div class="card text-center">
    <h3>Descarga Masiva de Guías</h3>
    <p class="text-muted">Trae meses enteros sin límites. Genera un archivo Excel listo para descargar.</p>
    
    <div class="row justify-content-center mt-4">
      <div class="col-md-3">
        <input type="date" id="start_date" class="form-control" style="font-size:1.1rem; padding:10px;">
      </div>
      <div class="col-md-3">
        <input type="date" id="end_date" class="form-control" style="font-size:1.1rem; padding:10px;">
      </div>
      <div class="col-md-3">
        <button id="btnDescargar" class="btn btn-naranja btn-block" onclick="generarExcel()">
          Generar y Descargar
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  let hoy = new Date().toISOString().split("T")[0];
  let primerDia = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split("T")[0];
  document.getElementById("start_date").value = primerDia;
  document.getElementById("end_date").value = hoy;

  async function generarExcel() {
    const start = document.getElementById("start_date").value;
    const end = document.getElementById("end_date").value;
    if (!start || !end) return Swal.fire("Error", "Selecciona fechas", "error");

    const btn = document.getElementById("btnDescargar");
    btn.disabled = true;
    btn.innerText = "Procesando en el servidor...";

    try {
      // Le decimos al navegador que abra la URL directamente. Esto descarga el archivo.
      const url = `/api/descargar-excel?start_date=${start}&end_date=${end}`;
      
      // Usamos fetch para saber cuándo termina y mostrar la alerta
      const response = await fetch(url);
      
      if (!response.ok) throw new Error("Error en el servidor");
      
      // Convertir a Blob y forzar descarga
      const blob = await response.blob();
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Reporte_${start}_a_${end}.csv`;
      link.click();
      URL.revokeObjectURL(link.href);

      Swal.fire("¡Descargado!", "Tu archivo Excel está listo.", "success");
    } catch (e) {
      Swal.fire("Error", "No se pudo generar el archivo.", "error");
    } finally {
      btn.disabled = false;
      btn.innerText = "Generar y Descargar";
    }
  }
</script>

</body>
</html>
