<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reporte Maestro de Guías</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.5.2/css/bootstrap.css">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    body { padding: 20px; background:#f4f6f9; }
    .card { box-shadow:0 4px 10px rgba(0,0,0,0.1); border-radius:10px; }
    .btn-naranja { background-color: #ff7e00; border-color: #e06e00; color: #ffffff; font-weight: 600; transition: all 0.2s; }
    .btn-naranja:hover { background-color: #e06e00; border-color: #c56000; color: #ffffff; }
    .btn-naranja:disabled { background-color: #ffc299; border-color: #ffc299; cursor: not-allowed; }
    .loader { border: 4px solid #ffcca8; border-top: 4px solid #ffffff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-left: 10px; vertical-align: middle;}
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .progress { height: 28px; border-radius: 10px; background-color: #ffe0c2; }
    .bg-naranja { background-color: #ff7e00 !important; }
    .alert-reintento { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; padding: 10px; border-radius: 5px; font-size: 0.9rem; margin-top: 15px; display: none; }
    .resumen-box { background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%); border: 2px solid #ffba6b; border-radius: 12px; padding: 25px; text-align: center; display: none; }
    .resumen-box .numero { font-size: 2.8rem; font-weight: 800; color: #d45e00; line-height: 1; }
    .resumen-box .etiqueta { font-size: 0.95rem; color: #8a5a2a; margin-top: 4px; }
    .mem-badge { display: inline-block; background: #e8f5e9; color: #2e7d32; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
    .velocidad-badge { display: inline-block; background: #e3f2fd; color: #1565c0; padding: 3px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-left: 5px; }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="card-body">
      <h3 class="card-title mb-4">Reporte de Guías</h3>
      <p class="text-muted mb-3" style="font-size:0.9rem;">
        <strong>Descarga paralela:</strong> Trae varias páginas al mismo tiempo sin dibujar tabla. Un mes completo se descarga en segundos.
      </p>

      <div class="row">
        <div class="col-md-3">
          <label>Fecha inicio</label>
          <input type="date" id="start_date" class="form-control">
        </div>
        <div class="col-md-3">
          <label>Fecha fin</label>
          <input type="date" id="end_date" class="form-control">
        </div>
        <div class="col-md-3">
          <label>&nbsp;</label>
          <button id="btnBuscar" class="btn btn-naranja btn-block" onclick="buscar()">
            <span id="btnText">Buscar y Descargar</span>
            <span id="btnLoader" class="loader" style="display:none;"></span>
          </button>
        </div>
      </div>

      <div id="alertaReintento" class="alert-reintento"></div>

      <div class="mt-3" id="contenedorProgreso" style="display: none;">
        <div class="d-flex justify-content-between mb-1">
          <span id="textoProgreso" class="font-weight-bold text-secondary" style="font-size: 0.9rem;">Consultando...</span>
          <span id="porcentajeProgreso" class="font-weight-bold text-dark">0%</span>
        </div>
        <div class="progress">
          <div class="progress-bar progress-bar-striped progress-bar-animated bg-naranja" id="barraProgreso" role="progressbar" style="width: 0%"></div>
        </div>
        <div class="text-right mt-1">
          <span id="memoriaUsada" class="mem-badge">--</span>
          <span id="velocidadBadge" class="velocidad-badge" style="display:none;">--</span>
        </div>
      </div>

      <div id="resumenFinal" class="resumen-box mt-4">
        <div class="numero" id="resumenNumero">0</div>
        <div class="etiqueta">guías descargadas correctamente</div>
        <div class="mt-2" id="resumenRango" style="font-size:0.85rem; color:#a07040;"></div>
      </div>

    </div>
  </div>
</div>

<script>

 $(document).ready(function () {
  let hoy = new Date().toISOString().split("T")[0];
  document.getElementById("start_date").value = hoy;
  document.getElementById("end_date").value = hoy;
});

function pausa(ms) {
  return new Promise(function (resolve) { setTimeout(resolve, ms); });
}

function formatFecha(raw) {
  if (!raw) return "";
  try {
    let d = new Date(raw);
    return d.toLocaleDateString('es-CO', { year: 'numeric', month: '2-digit', day: '2-digit' })
      + " " + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  } catch (e) { return raw; }
}

function actualizarMemoria() {
  if (performance.memory) {
    let mb = (performance.memory.usedJSHeapSize / 1048576).toFixed(1);
    document.getElementById("memoriaUsada").innerText = "RAM: " + mb + " MB";
  } else {
    document.getElementById("memoriaUsada").innerText = "RAM: N/D";
  }
}

// Trae UNA página individual con reintento automático
async function fetchPagina(start, end, page) {
  let intentos = 0;
  while (intentos < 3) {
    try {
      let res = await fetch("/api/guias?start_date=" + start + "&end_date=" + end + "&page=" + page);
      if (!res.ok) {
        intentos++;
        await pausa(2000);
        continue;
      }
      let data = await res.json();
      return data;
    } catch (e) {
      intentos++;
      await pausa(2000);
    }
  }
  return null;
}

async function buscar() {
  let start = document.getElementById("start_date").value;
  let end = document.getElementById("end_date").value;

  if (!start || !end) return Swal.fire("Advertencia", "Selecciona fechas", "warning");

  document.getElementById("btnText").innerText = "Consultando...";
  document.getElementById("btnLoader").style.display = "inline-block";
  document.getElementById("btnBuscar").disabled = true;
  document.getElementById("contenedorProgreso").style.display = "block";
  document.getElementById("alertaReintento").style.display = "none";
  document.getElementById("resumenFinal").style.display = "none";
  document.getElementById("barraProgreso").style.width = "0%";
  document.getElementById("porcentajeProgreso").innerText = "0%";
  document.getElementById("textoProgreso").innerText = "Conectando...";
  document.getElementById("velocidadBadge").style.display = "none";

  let todasLasGuias = [];
  let encabezados = [
    "Guía", "Estado", "Fecha", "Empresa", "Remitente",
    "Destinatario", "Ciudad Dest.", "Transportadora",
    "Tipo Pago", "Total", "Recaudo"
  ];

  // Cuántas páginas traer al mismo tiempo (5 es agresivo pero rápido)
  let LOTE = 5;

  let tiempoInicio = Date.now();

  try {
    // PASO 1: Traer página 1 para saber cuántas páginas hay en total
    let primera = await fetchPagina(start, end, 1);

    if (!primera || !primera.ok) {
      throw new Error("No se pudo conectar o no hay datos en ese rango.");
    }

    let totalPages = primera.totalPages;

    if (primera.rows && primera.rows.length > 0) {
      todasLasGuias = todasLasGuias.concat(primera.rows);
    }

    let porcentaje = totalPages > 1 ? Math.round((1 / totalPages) * 100) : 100;
    document.getElementById("barraProgreso").style.width = porcentaje + "%";
    document.getElementById("porcentajeProgreso").innerText = porcentaje + "%";
    document.getElementById("textoProgreso").innerText =
      "Página 1 de " + totalPages + " — " + todasLasGuias.length + " guías";

    // Si solo hay 1 página, ya terminamos
    if (totalPages <= 1) {
      // saltar directo a generar Excel
    } else {
      // PASO 2: Traer el resto en lotes paralelos
      let paginasRestantes = [];
      for (let p = 2; p <= totalPages; p++) {
        paginasRestantes.push(p);
      }

      // Recorrer en bloques de LOTE
      for (let i = 0; i < paginasRestantes.length; i += LOTE) {
        let bloque = paginasRestantes.slice(i, i + LOTE);

        // Disparar todas las peticiones del bloque al mismo tiempo
        let promesas = bloque.map(function (pagina) {
          return fetchPagina(start, end, pagina);
        });

        let resultados = await Promise.all(promesas);

        // Acumular los resultados exitosos
        for (let j = 0; j < resultados.length; j++) {
          let r = resultados[j];
          if (r && r.ok && r.rows && r.rows.length > 0) {
            todasLasGuias = todasLasGuias.concat(r.rows);
          }
        }

        // Actualizar progreso con la última página del bloque
        let ultimaPag = bloque[bloque.length - 1];
        let pct = Math.round((ultimaPag / totalPages) * 100);
        document.getElementById("barraProgreso").style.width = pct + "%";
        document.getElementById("porcentajeProgreso").innerText = pct + "%";
        document.getElementById("textoProgreso").innerText =
          "Página " + ultimaPag + " de " + totalPages + " — " + todasLasGuias.length + " guías";

        actualizarMemoria();

        // Pausa mínima entre bloques para no quemar el servidor
        await pausa(100);
      }
    }

    if (todasLasGuias.length === 0) {
      Swal.fire("Sin datos", "No se encontraron guías en ese rango.", "info");
      return;
    }

    // PASO 3: Generar Excel
    document.getElementById("textoProgreso").innerText = "Generando archivo Excel...";
    document.getElementById("barraProgreso").style.width = "100%";
    document.getElementById("porcentajeProgreso").innerText = "100%";
    await pausa(50);

    // Formatear fechas de golpe
    for (let i = 0; i < todasLasGuias.length; i++) {
      todasLasGuias[i][2] = formatFecha(todasLasGuias[i][2]);
    }

    let aoa = [encabezados].concat(todasLasGuias);
    let ws = XLSX.utils.aoa_to_sheet(aoa);

    ws['!cols'] = [
      { wch: 18 }, { wch: 22 }, { wch: 22 }, { wch: 30 },
      { wch: 30 }, { wch: 30 }, { wch: 20 }, { wch: 16 },
      { wch: 22 }, { wch: 12 }, { wch: 12 }
    ];

    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Guias");

    let nombreArchivo = "Guias_" + start + "_" + end + ".xlsx";

    XLSX.writeFile(wb, nombreArchivo);

    let totalDescargadas = todasLasGuias.length;
    let tiempoTotal = ((Date.now() - tiempoInicio) / 1000).toFixed(1);

    todasLasGuias = null;
    aoa = null;
    ws = null;
    wb = null;

    // Mostrar resumen
    document.getElementById("resumenNumero").innerText = totalDescargadas;
    document.getElementById("resumenRango").innerText =
      start + " → " + end + " — Archivo: " + nombreArchivo;
    document.getElementById("resumenFinal").style.display = "block";

    // Mostrar badge de velocidad
    document.getElementById("velocidadBadge").style.display = "inline-block";
    document.getElementById("velocidadBadge").innerText = tiempoTotal + "s";

    Swal.fire({
      icon: "success",
      title: "Descarga lista",
      text: totalDescargadas + " guías en " + tiempoTotal + " segundos",
      confirmButtonText: "OK",
      confirmButtonColor: "#ff7e00"
    });

  } catch (e) {
    console.error(e);
    Swal.fire("Error", e.message, "error");
  } finally {
    document.getElementById("btnText").innerText = "Buscar y Descargar";
    document.getElementById("btnLoader").style.display = "none";
    document.getElementById("btnBuscar").disabled = false;
    document.getElementById("alertaReintento").style.display = "none";

    setTimeout(function () {
      document.getElementById("contenedorProgreso").style.display = "none";
      document.getElementById("barraProgreso").style.width = "0%";
      document.getElementById("velocidadBadge").style.display = "none";
    }, 4000);
  }
}

</script>

</body>
</html>
